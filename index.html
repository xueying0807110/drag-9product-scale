<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Display Page</title>
  <style>
    :root {
      --text: #111;
      --muted: #666;
      --border: #d8d8d8;
      --background: #ffffff;
      --soft: #f6f6f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--background);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0.01em;
    }

    .topbar {
      height: 64px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .page {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 36px 16px 56px;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
      gap: 24px;
      align-items: stretch;
    }

    .image-panel {
      background: var(--soft);
      min-height: 568px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #eeeeee;
      overflow: hidden;
      contain: layout paint;
    }

    .product-image {
      width: 88%;
      height: 480px;
      object-fit: contain;
      display: block;
      opacity: 0;
      visibility: hidden;
      transform: translateZ(0);
      will-change: opacity;
    }

    .product-image.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .details {
      padding-top: 4px;
      min-height: 568px;
      display: flex;
      flex-direction: column;
    }

    .brand {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 24px;
      line-height: 1.28;
      margin: 0 0 10px;
      font-weight: 500;
    }

    .subtitle {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
      display: flex;
      align-items: baseline;
      gap: 36px;
    }

    .subtitle-price {
      color: inherit;
      font-size: inherit;
      font-weight: inherit;
      white-space: nowrap;
    }

    .field {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .custom-select {
      position: relative;
      width: 100%;
    }

    .custom-select-trigger {
      width: 100%;
      min-height: 32px;
      height: auto;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      font-size: 15px;
      padding: 7px 42px 7px 14px;
      border-radius: 0;
      outline: none;
      text-align: left;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 24px;
    }

    .custom-select-trigger::after {
      content: "";
      position: absolute;
      right: 16px;
      top: 10px;
      width: 8px;
      height: 8px;
      border-right: 1px solid #222;
      border-bottom: 1px solid #222;
      transform: rotate(45deg);
    }

    .custom-select.open .custom-select-trigger {
      border-color: var(--border);
    }

    .custom-select.has-selection .custom-select-trigger,
    .custom-select.open.has-selection .custom-select-trigger {
      border-color: #111;
    }

    .trigger-name,
    .trigger-price {
      font-size: 13px;
    }

    .custom-options {
      display: none;
      position: absolute;
      top: 32px;
      left: 0;
      right: 0;
      z-index: 999;
      margin: -1px 0 0;
      padding: 0;
      list-style: none;
      background: #fff;
      border: 1px solid #111;
      max-height: none;
      overflow: visible;
    }

    .custom-select.open .custom-options {
      display: block;
    }

    .custom-option {
      min-height: 34px;
      padding: 7px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      font-size: 13px;
      line-height: 1.35;
      cursor: pointer;
    }

    .custom-option:hover {
      background: #f4f4f4;
    }


    .decision-message {
      display: block;
      visibility: hidden;
      margin: auto 0 12px;
      padding: 0;
      background: transparent;
      border: 0;
      font-size: 13px;
      line-height: 1.4;
      color: #b00020;
    }

    .decision-message.is-visible {
      visibility: visible;
    }

    .time-warning {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.98);
      z-index: 9999;
      max-width: min(420px, calc(100% - 32px));
      padding: 16px 20px;
      border: 2px solid #111;
      background: #fff;
      color: #111;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
      text-align: center;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.22);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 120ms ease, visibility 120ms ease, transform 120ms ease;
    }

    .time-warning.is-visible {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr;
      margin-top: 0;
      gap: 12px;
    }

    .button {
      width: 100%;
      height: 48px;
      border: 1px solid #b8b8b8;
      background: #b8b8b8;
      color: #fff;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: default;
    }

    .button-row.is-enabled .button {
      border-color: #111;
      background: #111;
      cursor: pointer;
    }

    .note {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 420px) {
      .page {
        grid-template-columns: 1fr;
        gap: 32px;
        padding: 28px 18px 48px;
        align-items: start;
      }

      .image-panel {
        min-height: 420px;
      }

      .details {
        min-height: auto;
      }

      .button-row {
        margin-top: 24px;
      }

      .product-image {
        width: 86%;
        height: 380px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">LUNVIERO</header>

  <main class="page">
    <section class="details" aria-label="Product selection area">
      <div class="brand">Aurelia Studio</div>
      <h1>Nilestone Mouse Pad</h1>
      <div class="subtitle">
        <span>Premium-Textured Mouse Pad</span>
        <span class="subtitle-price">$6.5</span>
      </div>

      <div class="field">
        <label id="productLabel">Product</label>
        <div class="custom-select" id="productSelect" aria-labelledby="productLabel">
          <button class="custom-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false"></button>
          <ul class="custom-options" role="listbox"></ul>
        </div>
      </div>

      <div class="decision-message" id="decisionMessage">please click the option before placing an order</div>

      <div class="button-row is-enabled" id="buttonRow">
        <button class="button" type="button" data-action="continue">Continue</button>
      </div>

    </section>

    <section class="image-panel" aria-label="Product image area">
      <img id="productImage" class="product-image" src="" alt="" decoding="async" loading="eager" />
    </section>
  </main>

  <div class="time-warning" id="timeWarning" role="status" aria-live="polite">Please carefully review the options before continuing.</div>

  <script src="products.js"></script>
  <script>
    const productSelect = document.getElementById('productSelect');
    const trigger = productSelect.querySelector('.custom-select-trigger');
    const optionList = productSelect.querySelector('.custom-options');
    const productImage = document.getElementById('productImage');
    const buttonRow = document.getElementById('buttonRow');
    const decisionMessage = document.getElementById('decisionMessage');
    const timeWarning = document.getElementById('timeWarning');

    let selectedProductName = '';
    let selectedProductImage = '';
    let selectedProductPrice = '';
    let pageOpenTime = new Date().toISOString();
    let buttonsShownTime = pageOpenTime;
    let buttonsEnabledTime = '';
    let canContinue = false;
    let firstOptionClickTime = '';
    let lastDisplayedImage = '';
    let dropdownOpened = '0';
    let dropdownOpenCount = 0;
    let optionReviewed = '0';

    let totalClicks = 0;
    let optionClicks = 0;
    let imageSwitches = 0;
    let invalidButtonClicks = 0;

    document.addEventListener('click', () => {
      totalClicks += 1;
    });
    const preloadedImages = new Map();

    function preloadImage(src) {
      if (!src || preloadedImages.has(src)) return;

      const img = new Image();
      img.decoding = 'async';
      img.loading = 'eager';
      img.src = src;

      preloadedImages.set(src, img);

      if (img.decode) {
        img.decode().catch(() => {});
      }
    }

    function preloadProductImages() {
      if (!Array.isArray(window.PRODUCTS)) return;

      window.PRODUCTS.forEach((product) => {
        preloadImage(product.image);
      });
    }

    function showProductImage(src, alt, countSwitch = false) {
      if (!src) return;

      if (countSwitch && lastDisplayedImage !== src) {
        imageSwitches += 1;
      }

      preloadImage(src);
      productImage.src = src;
      productImage.alt = alt || '';
      productImage.classList.add('is-visible');
      lastDisplayedImage = src;
    }

    function restoreSelectedProductImage() {
      if (!selectedProductImage) return;

      showProductImage(selectedProductImage, selectedProductName);
    }

    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    function buildProductOptions() {
      if (!Array.isArray(window.PRODUCTS)) return;

      const randomizedProducts = shuffleArray(window.PRODUCTS);
      optionList.innerHTML = '';

      randomizedProducts.forEach((product) => {
        const option = document.createElement('li');
        option.className = 'custom-option';
        option.setAttribute('role', 'option');
        option.dataset.name = product.name;
        option.dataset.image = product.image;

        const nameSpan = document.createElement('span');
        nameSpan.className = 'option-name';
        nameSpan.textContent = product.name;

        option.appendChild(nameSpan);
        optionList.appendChild(option);
      });
    }

    trigger.addEventListener('click', () => {
      const isOpen = productSelect.classList.toggle('open');
      trigger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');

      if (isOpen) {
        dropdownOpened = '1';
        dropdownOpenCount += 1;
        decisionMessage.classList.remove('is-visible');
      } else {
        restoreSelectedProductImage();
      }
    });

    optionList.addEventListener('click', (event) => {
      const option = event.target.closest('.custom-option');
      if (!option) return;


      optionClicks += 1;
      optionReviewed = '1';
      trigger.innerHTML = '';

      const selectedName = document.createElement('span');
      selectedName.className = 'trigger-name';
      selectedName.textContent = option.dataset.name;

      trigger.appendChild(selectedName);

      selectedProductName = option.dataset.name || '';
      selectedProductImage = option.dataset.image || '';
      selectedProductPrice = '$6.5';
      productSelect.classList.add('has-selection');
      decisionMessage.classList.remove('is-visible');
      hideTimeWarning();

      if (!firstOptionClickTime) {
        firstOptionClickTime = new Date().toISOString();
      }

      showProductImage(option.dataset.image, option.dataset.name);
      productSelect.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
    });

    optionList.addEventListener('mouseover', (event) => {
      const option = event.target.closest('.custom-option');
      if (!option) return;

      optionReviewed = '1';
      decisionMessage.classList.remove('is-visible');
      showProductImage(option.dataset.image, option.dataset.name, true);
    });

    function showTimeWarning() {
      timeWarning.classList.add('is-visible');
    }

    function hideTimeWarning() {
      timeWarning.classList.remove('is-visible');
    }

    document.addEventListener('click', (event) => {
      if (!productSelect.contains(event.target)) {
        const wasOpen = productSelect.classList.contains('open');
        productSelect.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');

        if (wasOpen) {
          restoreSelectedProductImage();
        }
      }
    });

    buttonRow.addEventListener('click', (event) => {
      const button = event.target.closest('.button');
      if (!button) return;

      const action = button.dataset.action || '';
      if (!canContinue) {
        invalidButtonClicks += 1;
        showTimeWarning();
        return;
      }

      window.parent.postMessage({
        type: 'netlify_complete',
        action: action,
        choice: selectedProductName,
        page: window.location.pathname,
        selectedProduct: selectedProductName,
        selectedPrice: selectedProductPrice,
        selectedProductImage: selectedProductImage,
        productChosen: selectedProductName ? '1' : '0',
        totalClicks: String(totalClicks),
        optionClicks: String(optionClicks),
        imageSwitches: String(imageSwitches),
        invalidButtonClicks: String(invalidButtonClicks),
        pageOpenTime: pageOpenTime,
        buttonsShownTime: buttonsShownTime,
        buttonsEnabledTime: buttonsEnabledTime,
        firstOptionClickTime: firstOptionClickTime,
        dropdownOpened: dropdownOpened,
        dropdownOpenCount: String(dropdownOpenCount),
        optionReviewed: optionReviewed
      }, '*');
    });

    buildProductOptions();
    preloadProductImages();
    window.setTimeout(() => {
      canContinue = true;
      buttonsEnabledTime = new Date().toISOString();
    }, 10000);
  </script>
</body>
</html>
